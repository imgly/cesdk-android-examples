pluginManagement {
    repositories {
        google {
            content {
                includeGroupByRegex("com\\.android.*")
                includeGroupByRegex("com\\.google.*")
                includeGroupByRegex("androidx.*")
            }
        }
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven {
            name "IMG.LY Artifactory"
            url "https://artifactory.img.ly/artifactory/maven"
            mavenContent {
                includeGroup("ly.img")
            }
        }
        exclusiveContent {
            forRepository {
                ivy {
                    name = 'BundleTool releases'
                    url = 'https://github.com/google/bundletool/releases/download/'
                    patternLayout {
                        artifact '[revision]/[module](-[classifier])-[revision](.[ext])'
                    }
                    metadataSources {
                        artifact()
                    }
                }
            }
            filter {
                includeGroup('bundletool-github')
            }
        }
    }
}

rootProject.name = "CE.SDK Android Showcases"
include ':showcases-app'
include ':solutions:photo-editor'
include ':solutions:solution-template'

if (file('internal.settings.gradle').exists()) {
    apply from: 'internal.settings.gradle'
}
